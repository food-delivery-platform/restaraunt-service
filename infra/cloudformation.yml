AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  Temporary restaurant-service ECS Fargate task definition and service.
  Attaches to the existing food-delivery-preview-platform cluster, target
  group, and security group instead of creating its own. Stack name must be
  restaurant-service-runtime so the shared cleanup automation can delete it.

Parameters:
  ClusterName:
    Type: String
    Description: ClusterName output from the food-delivery-preview-platform stack.

  TargetGroupArn:
    Type: String
    Description: RestaurantTargetGroupArn output from food-delivery-preview-platform.

  TaskSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: RestaurantTaskSecurityGroupId output from food-delivery-preview-platform.

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: SubnetIds output from food-delivery-preview-platform.

  ImageUri:
    Type: String
    Default: public.ecr.aws/docker/library/busybox:1.36.1
    Description: Container image to run. GitHub Actions updates this on every push while the preview platform is running.

  ContainerPort:
    Type: Number
    Default: 8080

  DesiredCount:
    Type: Number
    Default: 1
    Description: Number of ECS tasks to run once a real image has been deployed.

  TaskCpu:
    Type: String
    Default: "256"
    AllowedValues:
      - "256"
      - "512"
      - "1024"
      - "2048"
      - "4096"

  TaskMemory:
    Type: String
    Default: "512"
    AllowedValues:
      - "512"
      - "1024"
      - "2048"
      - "3072"
      - "4096"
      - "5120"
      - "6144"
      - "7168"
      - "8192"

  DatabaseSecretArn:
    Type: String
    NoEcho: true
    Description: >-
      ARN of the Secrets Manager secret containing RESTAURANT_DB_URL. Passed
      by the deploy workflow from the DATABASE_SECRET_ARN GitHub secret; no
      default so the ARN never lives in source control.

  DbSsl:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"

  DbPoolMin:
    Type: String
    Default: "0"

  DbPoolMax:
    Type: String
    Default: "10"

  RestaurantOwnerGroup:
    Type: String
    Default: restaurant-owner

Conditions:
  HasApplicationImage: !Not
    - !Equals
      - !Ref ImageUri
      - public.ecr.aws/docker/library/busybox:1.36.1

Resources:
  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/restaurant-service
      RetentionInDays: 30

  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: restaurant-service-runtime-execution
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: restaurant-service-runtime-task
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: read-database-secret
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref DatabaseSecretArn

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: restaurant-service
      Cpu: !Ref TaskCpu
      Memory: !Ref TaskMemory
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: restaurant-service
          Image: !Ref ImageUri
          Essential: true
          PortMappings:
            - ContainerPort: !Ref ContainerPort
              Protocol: tcp
          Environment:
            - Name: AWS_DB_SECRET_ARN
              Value: !Ref DatabaseSecretArn
            - Name: AWS_REGION
              Value: !Ref AWS::Region
            - Name: DB_SSL
              Value: !Ref DbSsl
            - Name: PORT
              Value: !Ref ContainerPort
            - Name: DB_POOL_MIN
              Value: !Ref DbPoolMin
            - Name: DB_POOL_MAX
              Value: !Ref DbPoolMax
            - Name: RESTAURANT_OWNER_GROUP
              Value: !Ref RestaurantOwnerGroup
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs

  Service:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: restaurant-service
      Cluster: !Ref ClusterName
      DesiredCount: !If
        - HasApplicationImage
        - !Ref DesiredCount
        - 0
      LaunchType: FARGATE
      TaskDefinition: !Ref TaskDefinition
      NetworkConfiguration:
        AwsvpcConfiguration:
          # The shared network stack has only public subnets and no NAT
          # gateway, so tasks need a public IP to reach ECR, Secrets
          # Manager, and the database.
          AssignPublicIp: ENABLED
          SecurityGroups:
            - !Ref TaskSecurityGroupId
          Subnets: !Ref SubnetIds
      LoadBalancers:
        - ContainerName: restaurant-service
          ContainerPort: !Ref ContainerPort
          TargetGroupArn: !Ref TargetGroupArn

Outputs:
  EcsClusterName:
    Value: !Ref ClusterName

  EcsServiceName:
    Value: !GetAtt Service.Name

  EcsTaskDefinitionFamily:
    Value: restaurant-service
